[main]
placeholder="Search and launch"
dpi-aware=no
icon-theme=Papirus-Dark
x-margin=10
y-margin=10
lines=10
width=60
horizontal-pad=20
vertical-pad=20
inner-pad=5
line-height=20
letter-spacing=0
font=Inter Light:size=16
line-height=25
fields=name,generic,comment,categories,filename,keywords,exec
terminal=foot -e
prompt="❯   "
show-actions=yes
exit-on-keyboard-focus-loss=yes
anchor=center
layer=top

[colors]
background=141e24ff
text=ecf0f1ff
prompt=7f8c8dff
placeholder=7f8c8daa
input=cad3f5ff
match=2980b9ff
selection=2c3e50ff
selection-text=ecf0f1ff
selection-match=2980b9ff
counter=8087a2ff
border=2c3e50ff

[border]
radius=10
width=2
selection-radius=8

[dmenu]
exit-immediately-if-empty=yes

