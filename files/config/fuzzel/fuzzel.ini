[main]
placeholder="Search and launch"
dpi-aware=no
icon-theme=Papirus-Light
x-margin=10
y-margin=10
lines=10
width=60
horizontal-pad=20
vertical-pad=20
inner-pad=5
letter-spacing=0
font=Inter Light:size=18
image-size=14
line-height=25
fields=name,generic,comment,categories,filename,keywords,exec
terminal=foot -e
prompt="❯   "
show-actions=yes
exit-on-keyboard-focus-loss=yes
anchor=center
layer=top

[colors]
background=f2ede8ff
text=1e2a32ff
prompt=4a6572ff
placeholder=4a657288
input=1e2a32ff
match=3d9970ff
selection=e8e2dbff
selection-text=1e2a32ff
selection-match=3d9970ff
counter=4a6572ff
border=d4cdc6ff

[border]
radius=10
width=2
selection-radius=8

[dmenu]
exit-immediately-if-empty=yes

